name: macOS x64 Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/macos-x64.yml"
      - "apps/agent/**"
      - "apps/desktop/**"
      - "packages/**"
      - "scripts/build-agent-sidecar.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"

permissions:
  contents: read

concurrency:
  group: macos-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS x64 installer
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: test "$(uname -m)" = "x86_64"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @forge/protocol build && pnpm --filter @forge/agent-core build

      - name: Build macOS x64 installer
        run: pnpm --filter @forge/desktop build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: forge-agent-macos-x64
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
