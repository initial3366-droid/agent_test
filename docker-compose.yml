services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - forge-postgres:/var/lib/postgresql/data
      - ./apps/api/drizzle:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6380:6379"]
volumes:
  forge-postgres:
